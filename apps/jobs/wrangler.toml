name = "caliber-agent"
compatibility_date = "2025-11-30"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "apex-db"
database_id = "748c0e4f-002f-4601-a831-4fe05bfd3e2f"
preview_database_id = "748c0e4f-002f-4601-a831-4fe05bfd3e2f"
migrations_dir = "drizzle"

# R2 bucket for generated PDF documents (resumes, cover letters)
[[r2_buckets]]
binding = "R2"
bucket_name = "apex-documents"

# KV namespace for session tokens (7-day TTL) and URL scrape cache
[[kv_namespaces]]
binding = "KV"
id = "ab583242d9ba46ab91ae5b7e488dc8c2"

# Browser Rendering API for job URL scraping
[browser]
binding = "BROWSER"

[assets]
directory = "dist/client"

[[routes]]
pattern = "jobs.spearyx.com"
custom_domain = true

[ai]
binding = "AI"
remote = true

# Hourly scheduler. App settings decide whether LinkedIn saved searches run hourly,
# every 6 hours, or daily, and analytics remains throttled inside the worker.
[triggers]
crons = ["0 * * * *"]
