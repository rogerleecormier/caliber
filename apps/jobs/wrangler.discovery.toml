name = "spearyx-sync-discovery"
main = "src/workers/discovery-sync.ts"
compatibility_date = "2025-11-30"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Every 3 min (was 6). Discovery only probes a few candidate companies per run with
# inter-request sleeps, so this stays well within ATS fair-use while doubling throughput.
crons = ["*/3 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "spearyx-jobs"
database_id = "991bbe3f-8b3a-4ce4-9de8-c2110052662f"

[observability]
enabled = true
