name = "caliber"
compatibility_date = "2025-11-30"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[build]
command = "npm run build"

[define]
"import.meta.env.DEV" = "false"
"import.meta.env.PROD" = "true"

[vars]
BETTER_AUTH_URL = "https://caliber.rcormier.dev"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "caliber-db"
database_id = "55a19e36-ed5b-4a31-83db-56ec83dd9a71"
preview_database_id = "55a19e36-ed5b-4a31-83db-56ec83dd9a71"
migrations_dir = "drizzle"
remote = true

# R2 bucket for generated PDF documents (resumes, cover letters)
[[r2_buckets]]
binding = "R2"
bucket_name = "caliber-documents"

# KV namespace for session tokens (7-day TTL) and URL scrape cache
[[kv_namespaces]]
binding = "KV"
id = "0356f2290c784e4789b76a9c1956bdda"

# Browser Rendering API for job URL scraping
[browser]
binding = "BROWSER"

# Vectorize for semantic RAG: resume embeddings and similarity matching (bge-large-en-v1.5: 1024 dims)
[[vectorize]]
binding = "VECTORIZE"
index_name = "resume-embeddings"

[assets]
directory = "dist/client"

[[routes]]
pattern = "caliber.rcormier.dev"
custom_domain = true

[ai]
binding = "AI"
remote = true

# Scheduled run every 30 minutes. App settings decide whether LinkedIn saved searches run hourly,
# every 6 hours, or daily, and analytics remains throttled inside the worker.
[triggers]
crons = ["0,30 * * * *"]

# Job Ingestion Queue — buffers scraped jobs to avoid D1 write lock contention
[[queues.producers]]
binding = "JOB_INGESTION_QUEUE"
queue = "job-ingestion-queue"

[[queues.consumers]]
queue = "job-ingestion-queue"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "job-ingestion-dlq"

# Scrape Request Queue — asynchronous job content fetching from ATS platforms
[[queues.producers]]
binding = "SCRAPE_REQUEST_QUEUE"
queue = "scrape-request-queue"

[[queues.consumers]]
queue = "scrape-request-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 2
dead_letter_queue = "scrape-request-dlq"

# Crawl Jobs Queue — buffer for crawling ATS boards
[[queues.producers]]
binding = "CRAWL_JOBS_QUEUE"
queue = "crawl-jobs"

[[queues.consumers]]
queue = "crawl-jobs"
max_batch_size = 100
max_batch_timeout = 30
max_retries = 3

# Discovery Queue — buffer for discovery phases
[[queues.producers]]
binding = "DISCOVERY_QUEUE"
queue = "discovery-queue"

[[queues.consumers]]
queue = "discovery-queue"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3

# Crawl Cron Queue — non-blocking cron job execution
[[queues.producers]]
binding = "CRAWL_CRON_QUEUE"
queue = "crawl-cron-queue"

[[queues.consumers]]
queue = "crawl-cron-queue"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 1

# Rate Limiter Durable Object
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]

