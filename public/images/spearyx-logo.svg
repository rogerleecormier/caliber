<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 28" width="240" height="28">
  <defs>
    <!-- Steel/Graphite Gradient for Precision Caliper -->
    <linearGradient id="caliber-steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Premium Gold/Amber Gradient for Star of Quality -->
    <linearGradient id="caliber-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="40%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
  
  <!-- High-Precision Caliper & Crosshair Symbol -->
  <g transform="translate(2, 0)">
    <!-- Outer Precision Ring (Target) -->
    <circle cx="13" cy="14" r="10" stroke="url(#caliber-steel)" stroke-width="1.5" fill="none" stroke-opacity="0.8" />
    <!-- Fine Crosshairs -->
    <line x1="13" y1="2" x2="13" y2="26" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="1 2" />
    <line x1="2" y1="14" x2="24" y2="14" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="1 2" />
    
    <!-- Caliper Vernier Arm / Jaw -->
    <path d="M7 6 A9 9 0 0 0 7 22 L5 24 L5 20 A7 7 0 0 1 7 8 Z" fill="url(#caliber-steel)" />
    <path d="M19 6 A9 9 0 0 1 19 22 L21 24 L21 20 A7 7 0 0 0 19 8 Z" fill="url(#caliber-steel)" />
    
    <!-- Premium Caliber Gold Star of Quality -->
    <path d="M13 8 L14.5 12.2 L19 12.2 L15.3 14.8 L16.7 19 L13 16.4 L9.3 19 L10.7 14.8 L7 12.2 L11.5 12.2 Z" fill="url(#caliber-gold)" />
  </g>

  <!-- Text Branding -->
  <text x="36" y="20" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="17" fill="#0f172a" letter-spacing="1">CALIBER</text>
  <text x="126" y="20" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="17" fill="#d97706" letter-spacing="0.5">Agent</text>
</svg>
